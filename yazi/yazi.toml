# A TOML linter such as https://taplo.tamasfe.dev/ can use this schema to validate your config.
# If you encounter any issues, please make an issue at https://github.com/yazi-rs/schemas.
"$schema" = "https://yazi-rs.github.io/schemas/yazi.json"

[mgr]
ratio          = [ 1, 4, 3 ]
sort_by        = "alphabetical"
sort_sensitive = false
sort_reverse 	 = false
sort_dir_first = true
sort_translit  = false
sort_fallback  = "alphabetical"
linemode       = "none"
show_hidden    = false
show_symlink   = true
scrolloff      = 5
mouse_events   = [ "click", "scroll" ]

[preview]
wrap            = "no"
tab_size        = 2
max_width       = 600
max_height      = 900
cache_dir       = ""
image_delay     = 30
image_filter    = "triangle"
image_quality   = 75
ueberzug_scale  = 1
ueberzug_offset = [ 0, 0, 0, 0 ]

[opener]
# --- Text & Code Editors ---
edit = [
    { run = 'nvim "$@"', desc = "Neovim", block = true, for = "unix" },
    { run = 'code "$@"', desc = "VS Code", orphan = true, for = "unix" },
    { run = 'vim "$@"', desc = "Vim", block = true, for = "unix" },
]

# --- Media Players (Video & Audio) ---
play = [
    { run = 'mpv "$@"', desc = "Play in mpv", orphan = true, for = "unix" },
    { run = 'tauonmb "$@"', desc = "Play in Tauon Music Box", orphan = true, for = "unix" },
    { run = 'namida "$@"', desc = "Play in Namida", orphan = true, for = "unix" },
]

# --- Image Viewers & Editors ---
view = [
    { run = 'feh "$@"', desc = "View in feh", orphan = true, for = "unix" },
    { run = 'gthumb "$@"', desc = "View in gThumb", orphan = true, for = "unix" },
    { run = 'gimp "$@"', desc = "Edit in GIMP", orphan = true, for = "unix" },
]

# --- Document Viewers ---
read = [
    { run = 'papers "$@"', desc = "Read in Papers", orphan = true, for = "unix" },
    { run = 'onlyoffice-desktopeditors "$@"', desc = "Open in OnlyOffice", orphan = true, for = "unix" },
]

# --- Generic Fallbacks & File Managers ---
open = [
    { run = 'xdg-open "$@"', desc = "System Default (xdg-open)", for = "linux" },
]

reveal = [
    { run = 'thunar "$(dirname "$1")"', desc = "Reveal in Thunar", orphan = true, for = "linux" },
    { run = 'xdg-open "$(dirname "$1")"', desc = "Reveal (System)", for = "linux" },
]

extract = [
    { run = 'ya pub extract --list "$@"', desc = "Extract (Yazi)" },
    { run = 'xarchiver "$@"', desc = "Open in Xarchiver", orphan = true, for = "linux" },
]

download = [
    { run = 'ya emit download --open "$@"', desc = "Download and open" },
    { run = 'ya emit download "$@"', desc = "Download" },
]

[open]
rules = [
    # Folders
    { url = "*/", use = [ "edit", "open", "reveal" ] },
    
    # Text / Code
    { mime = "text/*", use = [ "edit", "reveal" ] },
    { mime = "application/{json,ndjson,javascript,wine-extension-ini}", use = [ "edit", "reveal" ] },
    
    # Images
    { mime = "image/*", use = [ "view", "edit", "reveal" ] },
    
    # Media (Audio / Video)
    { mime = "{audio,video}/*", use = [ "play", "reveal" ] },
    
    # Documents (PDFs)
    { mime = "application/pdf", use = [ "read", "reveal" ] },
    
    # Office Documents (Spreadsheets, Word, etc.)
    { mime = "application/vnd.*", use = [ "read", "reveal" ] },
    
    # Archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", use = [ "extract", "reveal" ] },
    
    # Empty files
    { mime = "inode/empty", use = [ "edit", "reveal" ] },
    
    # Virtual file system
    { mime = "vfs/{absent,stale}", use = "download" },
    
    # Fallback (If none of the above match, just use the system default)
    { url = "*", use = [ "open", "reveal" ] },
]

[tasks]
file_workers     = 3
plugin_workers   = 5
fetch_workers    = 5
preload_workers  = 2
process_workers  = 5
bizarre_retry    = 3
image_alloc      = 536870912  # 512MB
image_bound      = [ 10000, 10000 ]
suppress_preload = false

[plugin]
spotters = [
	# Multi-file
	{ mime = "multi/*", run = "multi" },
	# Folder
	{ url = "*/", run = "folder" },
	# Code
	{ mime = "text/*", run = "code" },
	{ mime = "application/{mbox,javascript,wine-extension-ini}", run = "code" },
	# Image
	{ mime = "image/{avif,hei?,jxl}", run = "magick" },
	{ mime = "image/svg+xml", run = "svg" },
	{ mime = "image/*", run = "image" },
	# Video
	{ mime = "video/*", run = "video" },
	# Virtual file system
	{ mime = "vfs/*", run = "vfs" },
	# Error
	{ mime = "null/*", run = "null" },
	# Fallback
	{ url = "*", run = "file" },
]
preloaders = [
	# Image
	{ mime = "image/{avif,hei?,jxl}", run = "magick" },
	{ mime = "image/svg+xml", run = "svg" },
	{ mime = "image/*", run = "image" },
	# Video
	{ mime = "video/*", run = "video" },
	# PDF
	{ mime = "application/pdf", run = "pdf" },
	# Font
	{ mime = "font/*", run = "font" },
	{ mime = "application/ms-opentype", run = "font" },
]
previewers = [
	{ url = "*/", run = "folder" },
	# Code
	{ mime = "text/*", run = "code" },
	{ mime = "application/{mbox,javascript,wine-extension-ini}", run = "code" },
	# JSON
	{ mime = "application/{json,ndjson}", run = "json" },
	# Image
	{ mime = "image/{avif,hei?,jxl}", run = "magick" },
	{ mime = "image/svg+xml", run = "svg" },
	{ mime = "image/*", run = "image" },
	# Video
	{ mime = "video/*", run = "video" },
	# PDF
	{ mime = "application/pdf", run = "pdf" },
	# Archive
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", run = "archive" },
	{ mime = "application/{debian*-package,redhat-package-manager,rpm,android.package-archive}", run = "archive" },
	{ url = "*.{AppImage,appimage}", run = "archive" },
	# Virtual Disk / Disk Image
	{ mime = "application/{iso9660-image,qemu-disk,ms-wim,apple-diskimage}", run = "archive" },
	{ mime = "application/virtualbox-{vhd,vhdx}", run = "archive" },
	{ url = "*.{img,fat,ext,ext2,ext3,ext4,squashfs,ntfs,hfs,hfsx}", run = "archive" },
	# Font
	{ mime = "font/*", run = "font" },
	{ mime = "application/ms-opentype", run = "font" },
	# Empty file
	{ mime = "inode/empty", run = "empty" },
	# Virtual file system
	{ mime = "vfs/*", run = "vfs" },
	# Error
	{ mime = "null/*", run = "null" },
	# Fallback
	{ url = "*", run = "file" },
]

[input]
cursor_blink = false

# cd
cd_title  = "Change directory:"
cd_origin = "top-center"
cd_offset = [ 0, 2, 50, 3 ]

# create
create_title  = [ "Create:", "Create (dir):" ]
create_origin = "top-center"
create_offset = [ 0, 2, 50, 3 ]

# rename
rename_title  = "Rename:"
rename_origin = "hovered"
rename_offset = [ 0, 1, 50, 3 ]

# filter
filter_title  = "Filter:"
filter_origin = "top-center"
filter_offset = [ 0, 2, 50, 3 ]

# find
find_title  = [ "Find next:", "Find previous:" ]
find_origin = "top-center"
find_offset = [ 0, 2, 50, 3 ]

# search
search_title  = "Search via {n}:"
search_origin = "top-center"
search_offset = [ 0, 2, 50, 3 ]

# shell
shell_title  = [ "Shell:", "Shell (block):" ]
shell_origin = "top-center"
shell_offset = [ 0, 2, 50, 3 ]

[confirm]
# trash
trash_title 	= "Trash {n} selected file{s}?"
trash_origin	= "center"
trash_offset	= [ 0, 0, 70, 20 ]

# delete
delete_title 	= "Permanently delete {n} selected file{s}?"
delete_origin	= "center"
delete_offset	= [ 0, 0, 70, 20 ]

# overwrite
overwrite_title  = "Overwrite file?"
overwrite_body   = "Will overwrite the following file:"
overwrite_origin = "center"
overwrite_offset = [ 0, 0, 50, 15 ]

# quit
quit_title  = "Quit?"
quit_body   = "There are unfinished tasks, quit anyway?\n(Open task manager with default key 'w')"
quit_origin = "center"
quit_offset = [ 0, 0, 50, 15 ]

[pick]
open_title  = "Open with:"
open_origin = "hovered"
open_offset = [ 0, 1, 50, 7 ]

[which]
sort_by      	 = "none"
sort_sensitive = false
sort_reverse 	 = false
sort_translit  = false